name: pricing-snapshot

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh pricing snapshot
        run: node scripts/update-pricing.mjs

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain data/claude data/openai)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/claude data/openai
            git commit -m "chore: update model intel docs"
            git push
          else
            echo "No changes"
          fi
